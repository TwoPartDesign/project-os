<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Security Check</title>
</head>
<body>
  <div class="challenge-wrapper">
    <h1>Security Check</h1>
    <p>Please verify you are human before accessing this page.</p>
    <p>We have detected unusual activity from your IP address. Complete the challenge below to continue.</p>
    <form action="/verify" method="POST">
      <div class="captcha-container">
        <div class="g-recaptcha" data-sitekey="6LeIxAcTAAAAAJcZVRqyHh71UMIEGNQ_MXjiZKhI"></div>
      </div>
      <button type="submit">Verify</button>
    </form>
    <p class="footer-note">This check prevents automated access to our service.</p>
  </div>
</body>
</html>
